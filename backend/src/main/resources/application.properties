spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}

razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.admin-key=${ADMIN_KEY:changeme}

spring.jpa.open-in-view=false

# Email notification settings - see instructions for how to get a Gmail App Password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Where order notifications get sent - defaults to your own Gmail address if not set separately
app.notify-email=${NOTIFY_EMAIL:${MAIL_USERNAME}}